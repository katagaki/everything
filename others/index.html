<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title i18n>page.others.title</title>
<link rel="stylesheet" href="../styles.css">
<script type="module" src="../nav.js"></script>
<script type="module" src="../i18n.js"></script>
</head>
<body>

<main class="ktui-shell">

<section class="ktui-section">
  <h1 i18n>page.others.heading</h1>

  <div class="ktui-grid">
    <article class="ktui-card">
      <h2 class="ktui-card-name"><a href="https://github.com/katagaki/blue-archive-macos" i18n>others.blue_archive_macos.name</a></h2>
      <p class="ktui-card-desc" i18n>others.blue_archive_macos.desc</p>
      <div class="ktui-card-action"></div>
    </article>
    <article class="ktui-card">
      <h2 class="ktui-card-name"><a href="https://github.com/katagaki/RhythmIcons" i18n>others.rhythm_icons.name</a></h2>
      <p class="ktui-card-desc" i18n>others.rhythm_icons.desc</p>
      <div class="ktui-card-action"><a href="https://apps.apple.com/app/id6502974735"><img class="ktui-appstore-badge" src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store"></a></div>
    </article>
    <article class="ktui-card">
      <h2 class="ktui-card-name"><a href="https://gist.github.com/katagaki" i18n>others.gists.name</a></h2>
      <p class="ktui-card-desc" i18n>others.gists.desc</p>
      <div class="ktui-card-action"></div>
    </article>
  </div>
</section>

</main>

</body>
</html>
